<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="ru" x-data>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Contracts-PB{% endblock %}</title>
    {% load static tailwind_tags %}
    {% tailwind_css %}
    <link href="{% static 'front/css/output.css' %}" rel="stylesheet">
    <script src="{% static 'front/js/htmx.min.js' %}"></script>
    <script src="{% static 'front/js/alpine.min.js' %}" defer></script>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-800">
<nav class="bg-white shadow px-6 py-4 flex items-center justify-between">
    <div class="text-xl font-semibold">Contracts-PB</div>
    <div class="flex gap-4 items-center">
        {% if user.is_authenticated %}
            <span class="text-sm">{{ user.get_full_name|default:user.username }}</span>
            <a href="{% url 'identity:logout' %}" class="btn-sm btn-secondary">Выйти</a>
        {% else %}
            <a href="{% url 'login' %}" class="btn-sm btn-primary">Войти</a>
        {% endif %}
    </div>
</nav>
<main class="max-w-7xl mx-auto px-6 py-6">
    {% block content %}{% endblock %}
</main>
</body>
</html>
