<!-- templates/base.html -->
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Договоры{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap 5.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap-иконы -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'contract:list' %}">Договоры</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="делаем" data-bs-target="#mainMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contract:list' %}">Список</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contract:create' %}?type=licensee_oneoff">+ Разовый</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contract:create' %}?type=licensee_to">+ ТО</a>
</li>
                <li class="_nav-item">
                    <a class="nav-link" href="{% url 'contract:create' %}?type=licensee_smr">+ СМР</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contract:create' %}?type=lab_oneoff">+ Лаб. разовый</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contract:create' %}?type=lab_longterm">+ Лаб. долгосрочный</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'admin:index' %}">Админка</a>
>                </li>
            </ul>
        </div>
    </div>
</nav>
<main class="container my-4">
    {% block content %}{% endblock %}
</main>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
