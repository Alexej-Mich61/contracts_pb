<!--chat/partials/settings_form.html-->
<form hx-post="{% url 'chat:update_settings' %}"
      hx-target="#settings-container"
      hx-swap="outerHTML">
    <div class="form-check form-switch mb-2">
        <input class="form-check-input"
               type="checkbox"
               id="soundToggle"
               name="is_sound_enabled"
               {% if settings.is_sound_enabled %}checked{% endif %}
               onchange="this.form.submit()">
        <label class="form-check-label" for="soundToggle">
            Звук уведомлений
        </label>
    </div>

    <div class="mb-2">
        <label for="volumeRange" class="form-label small">
            Громкость: <span id="volumeValue">{{ settings.volume }}</span>%
        </label>
        <input type="range"
               class="form-range"
               id="volumeRange"
               name="volume"
               min="0"
               max="100"
               value="{{ settings.volume }}"
               hx-post="{% url 'chat:update_settings' %}"
               hx-target="#settings-container"
               hx-trigger="change delay:500ms">
    </div>
</form>
