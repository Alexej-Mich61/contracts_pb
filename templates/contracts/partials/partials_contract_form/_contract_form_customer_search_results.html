<!-- templates/contracts/partials/partials_contract_form/_contract_form_customer_search_results.html -->
{% if customers %}
    <div class="list-group list-group-flush">
        {% for customer in customers %}
            <button type="button"
                    class="list-group-item list-group-item-action customer-result py-2 px-3"
                    data-id="{{ customer.id }}"
                    data-name="{{ customer.name }}">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="fw-semibold">{{ customer.name }}</div>
                        <small class="text-muted">ИНН: {{ customer.inn }}</small>
                    </div>
                    <span class="badge bg-primary bg-opacity-10 text-primary">Выбрать</span>
                </div>
            </button>
        {% endfor %}
    </div>
{% elif query and query|length >= 2 %}
    <div class="p-3 text-muted text-center">
        <i class="bi bi-search me-2"></i>Ничего не найдено
    </div>
{% endif %}
