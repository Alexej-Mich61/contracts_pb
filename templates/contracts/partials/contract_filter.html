<!-- templates/contracts/partials/contract_filter.html -->

<div class="accordion mb-3" id="filterAccordion">
    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button collapsed" type="button"
                    data-bs-toggle="collapse" data-bs-target="#filterCollapse"
                    aria-expanded="false">
                <i class="bi bi-funnel me-2"></i> Фильтры
                <span class="badge bg-primary ms-2" id="active-filters-count" style="display: none;">0</span>
            </button>
        </h2>
        <div id="filterCollapse" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
            <div class="accordion-body">
                <!-- Убрали hx-trigger="change delay:300ms" -->
                <form id="contract-filter-form"
                      hx-get="{% url 'contract_core:contract_list_htmx' %}"
                      hx-target="#contracts-container"
                      hx-trigger="submit"
                      hx-indicator="#filter-spinner">

                    <div class="row g-3">
                        <!-- Базовые фильтры -->
                        <div class="col-md-3">
                            <label class="form-label">Расположение</label>
                            <select name="location" class="form-select form-select-sm">
                                <option value="active" {% if request.GET.location == 'active' %}selected{% endif %}>Актуальные</option>
                                <option value="archived" {% if request.GET.location == 'archived' %}selected{% endif %}>В архиве</option>
                                <option value="trash" {% if request.GET.location == 'trash' %}selected{% endif %}>В корзине</option>
                            </select>
                        </div>

                        <!-- Тип договора -->
                        <div class="col-md-3">
                            <label class="form-label">Тип договора</label>
                            <!-- Убрали hx-trigger, добавили класс for-htmx для JS -->
                            <select name="contract_type" class="form-select form-select-sm filter-dependent"
                                    data-hx-url="{% url 'contract_core:filter_works' %}"
                                    data-hx-target="#work-select-container">
                                <option value="">Все типы</option>
                                {% for value, label in filter_data.contract_types %}
                                    <option value="{{ value }}" {% if request.GET.contract_type == value %}selected{% endif %}>
                                        {{ label }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Вид работы -->
                        <div class="col-md-3">
                            <label class="form-label">Вид работы</label>
                            <div id="work-select-container">
                                {% include "contracts/partials/partials_contract_list_filter/_work_select.html" with works=filter_data.works selected_work=request.GET.work %}
                            </div>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Статус</label>
                            <select name="status" class="form-select form-select-sm" multiple size="4">
                                {% for value, label in filter_data.statuses %}
                                    <option value="{{ value }}" {% if value in request.GET.status %}selected{% endif %}>
                                        {{ label }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Поисковые поля -->
                        <div class="col-md-2">
                            <label class="form-label">ID договора</label>
                            <input type="number" name="contract_id" class="form-control form-control-sm"
                                   value="{{ request.GET.contract_id }}" placeholder="ID">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">Номер договора</label>
                            <input type="text" name="number" class="form-control form-control-sm"
                                   value="{{ request.GET.number }}" placeholder="Номер">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Заказчик (название/ИНН)</label>
                            <input type="text" name="customer" class="form-control form-control-sm"
                                   value="{{ request.GET.customer }}" placeholder="Поиск по заказчику">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Исполнитель (название/ИНН)</label>
                            <input type="text" name="executor" class="form-control form-control-sm"
                                   value="{{ request.GET.executor }}" placeholder="Поиск по исполнителю">
                        </div>

                        <!-- Диапазон дат -->
                        <div class="col-md-3">
                            <label class="form-label">Дата начала с</label>
                            <input type="date" name="date_from" class="form-control form-control-sm"
                                   value="{{ request.GET.date_from }}">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Дата окончания по</label>
                            <input type="date" name="date_to" class="form-control form-control-sm"
                                   value="{{ request.GET.date_to }}">
                        </div>

                        <!-- Стадии подписания -->
                        <div class="col-md-3">
                            <label class="form-label">Финальная стадия</label>
                            <select name="is_final" class="form-select form-select-sm">
                                <option value="">Все</option>
                                <option value="yes" {% if request.GET.is_final == 'yes' %}selected{% endif %}>Да</option>
                                <option value="no" {% if request.GET.is_final == 'no' %}selected{% endif %}>Нет</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Текущая стадия</label>
                            <select name="signing_stages" class="form-select form-select-sm" multiple size="4">
                                {% for stage in filter_data.signing_stages %}
                                    <option value="{{ stage.id }}" {% if stage.id|stringformat:"s" in request.GET.signing_stages %}selected{% endif %}>
                                        {{ stage.name }}{% if stage.is_final %} ★{% endif %}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- География -->
                        <div class="col-md-3">
                            <label class="form-label">Регион</label>
                            <select name="region" class="form-select form-select-sm filter-dependent"
                                    data-hx-url="{% url 'contract_core:filter_districts' %}"
                                    data-hx-target="#district-select-container">
                                <option value="">Все регионы</option>
                                {% for region in filter_data.regions %}
                                    <option value="{{ region.id }}" {% if request.GET.region == region.id|stringformat:"s" %}selected{% endif %}>
                                        {{ region.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Район</label>
                            <div id="district-select-container">
                                {% include "contracts/partials/partials_contract_list_filter/_district_select.html" with districts=districts selected_district=request.GET.district %}
                            </div>
                        </div>

                        <!-- Объекты защиты -->
                        <div class="col-md-3">
                            <label class="form-label">Название объекта</label>
                            <input type="text" name="object_name" class="form-control form-control-sm"
                                   value="{{ request.GET.object_name }}" placeholder="Поиск по объекту">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Адрес объекта</label>
                            <input type="text" name="object_address" class="form-control form-control-sm"
                                   value="{{ request.GET.object_address }}" placeholder="Поиск по адресу">
                        </div>

                        <!-- Флаги объектов -->
                        <div class="col-md-2">
                            <label class="form-label">Субподрядчик</label>
                            <select name="has_subcontractor" class="form-select form-select-sm">
                                <option value="">Все</option>
                                <option value="yes" {% if request.GET.has_subcontractor == 'yes' %}selected{% endif %}>Есть</option>
                                <option value="no" {% if request.GET.has_subcontractor == 'no' %}selected{% endif %}>Нет</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">АК</label>
                            <select name="has_ak" class="form-select form-select-sm">
                                <option value="">Все</option>
                                <option value="yes" {% if request.GET.has_ak == 'yes' %}selected{% endif %}>Есть</option>
                                <option value="no" {% if request.GET.has_ak == 'no' %}selected{% endif %}>Нет</option>
                            </select>
                        </div>

                        <!-- АК -->
                        <div class="col-md-2">
                            <label class="form-label">ID АК</label>
                            <input type="number" name="ak_id" class="form-control form-control-sm"
                                   value="{{ request.GET.ak_id }}" placeholder="ID АК">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">Номер АК</label>
                            <input type="number" name="ak_number" class="form-control form-control-sm"
                                   value="{{ request.GET.ak_number }}" placeholder="Номер АК">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Название АК</label>
                            <input type="text" name="ak_name" class="form-control form-control-sm"
                                   value="{{ request.GET.ak_name }}" placeholder="Поиск по названию АК">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Адрес АК</label>
                            <input type="text" name="ak_address" class="form-control form-control-sm"
                                   value="{{ request.GET.ak_address }}" placeholder="Поиск по адресу АК">
                        </div>

                        <!-- Акты -->
                        <div class="col-md-2">
                            <label class="form-label">Итоговый акт</label>
                            <select name="has_final_act" class="form-select form-select-sm">
                                <option value="">Все</option>
                                <option value="yes" {% if request.GET.has_final_act == 'yes' %}selected{% endif %}>Есть</option>
                                <option value="no" {% if request.GET.has_final_act == 'no' %}selected{% endif %}>Нет</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">Файл итог. акта</label>
                            <select name="has_final_act_file" class="form-select form-select-sm">
                                <option value="">Все</option>
                                <option value="yes" {% if request.GET.has_final_act_file == 'yes' %}selected{% endif %}>Есть</option>
                                <option value="no" {% if request.GET.has_final_act_file == 'no' %}selected{% endif %}>Нет</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">Промеж. акты</label>
                            <select name="has_interim_acts" class="form-select form-select-sm">
                                <option value="">Все</option>
                                <option value="yes" {% if request.GET.has_interim_acts == 'yes' %}selected{% endif %}>Есть</option>
                                <option value="no" {% if request.GET.has_interim_acts == 'no' %}selected{% endif %}>Нет</option>
                            </select>
                        </div>

                        <!-- Файл договора -->
                        <div class="col-md-2">
                            <label class="form-label">Файл договора</label>
                            <select name="has_file" class="form-select form-select-sm">
                                <option value="">Все</option>
                                <option value="yes" {% if request.GET.has_file == 'yes' %}selected{% endif %}>Есть</option>
                                <option value="no" {% if request.GET.has_file == 'no' %}selected{% endif %}>Нет</option>
                            </select>
                        </div>

                        <!-- Автор -->
                        <div class="col-md-4">
                            <label class="form-label">Автор (создатель/обновитель)</label>
                            <input type="text" name="author" class="form-control form-control-sm"
                                   value="{{ request.GET.author }}" placeholder="Имя или логин">
                        </div>
                    </div>

                    <!-- Кнопки -->
                    <div class="d-flex justify-content-between mt-3">
                        <button type="button" class="btn btn-outline-secondary btn-sm"
                                onclick="resetFilter()">
                            <i class="bi bi-x-circle"></i> Сбросить фильтр
                        </button>
                        <button type="submit" class="btn btn-primary btn-sm">
                            <span class="spinner-border spinner-border-sm d-none" id="filter-spinner"></span>
                            <i class="bi bi-search"></i> Применить фильтры
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Обработка зависимых полей (тип договора → работы, регион → районы)
document.querySelectorAll('.filter-dependent').forEach(function(select) {
    select.addEventListener('change', function() {
        var url = this.dataset.hxUrl;
        var target = this.dataset.hxTarget;
        var params = new URLSearchParams();
        params.append(this.name, this.value);

        // Для района добавляем текущее значение
        if (this.name === 'region') {
            var districtSelect = document.querySelector('[name="district"]');
            if (districtSelect) {
                params.append('district', districtSelect.value);
            }
        }
        // Для работы добавляем текущее значение
        if (this.name === 'contract_type') {
            var workSelect = document.querySelector('[name="work"]');
            if (workSelect) {
                params.append('work', workSelect.value);
            }
        }

        fetch(url + '?' + params.toString())
            .then(response => response.text())
            .then(html => {
                document.querySelector(target).innerHTML = html;
            });
    });
});

function resetFilter() {
    document.getElementById('contract-filter-form').reset();
    // Сбрасываем динамические списки
    document.getElementById('work-select-container').innerHTML = '<select name="work" id="work-select" class="form-select form-select-sm"><option value="">Все работы</option></select>';
    document.getElementById('district-select-container').innerHTML = '<select name="district" id="district-select" class="form-select form-select-sm"><option value="">Все районы</option></select>';
    // Отправляем пустой фильтр
    htmx.trigger('#contract-filter-form', 'submit');
}
</script>
