<!--templates/partials/current_time.html-->
{% load static %}
<span class="navbar-text d-flex align-items-center gap-2" id="current-time-wrapper">
    <i class="bi bi-clock"></i>
    <span id="current-time">{{ initial_time|default:"Загрузка..." }}</span>
</span>

<script>
    (function() {
        const timeElement = document.getElementById('current-time');

        function updateTime() {
            const now = new Date();
            const options = {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            timeElement.textContent = now.toLocaleDateString('ru-RU', options);
        }

        updateTime();
        setInterval(updateTime, 1000);
    })();
</script>
