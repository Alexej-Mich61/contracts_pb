<!-- templates/catalogs/partials/company_stats_modal.html -->
<div class="modal-header bg-info text-white">
    <h5 class="modal-title" id="statsModalLabel">
        <i class="bi bi-bar-chart-line me-2"></i>Статистика по компаниям
    </h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<div class="modal-body">
    <!-- Всего -->
    <div class="text-center mb-4">
        <div class="text-muted small mb-1">
            <i class="bi bi-building me-1"></i>Всего компаний
        </div>
        <div class="display-4 fw-bold text-dark">{{ total }}</div>
    </div>

    <hr class="my-3">

    <!-- По ролям -->
    <div class="row text-center g-3">
        <div class="col-6">
            <div class="p-2">
                <div class="text-muted small mb-1">
                    <i class="bi bi-person-check me-1 text-success"></i>Заказчиков
                </div>
                <div class="h2 fw-bold text-dark">{{ customers }}</div>
            </div>
        </div>
        <div class="col-6">
            <div class="p-2">
                <div class="text-muted small mb-1">
                    <i class="bi bi-shield-check me-1 text-warning"></i>Лицензиатов МЧС
                </div>
                <div class="h2 fw-bold text-dark">{{ licensees }}</div>
            </div>
        </div>
        <div class="col-6">
            <div class="p-2">
                <div class="text-muted small mb-1">
                    <i class="bi bi-virus me-1 text-info"></i>Лабораторий
                </div>
                <div class="h2 fw-bold text-dark">{{ laboratories }}</div>
            </div>
        </div>
        <div class="col-6">
            <div class="p-2">
                <div class="text-muted small mb-1">
                    <i class="bi bi-tools me-1 text-secondary"></i>Субподрядчиков
                </div>
                <div class="h2 fw-bold text-dark">{{ subcontractors }}</div>
            </div>
        </div>
    </div>

    <hr class="my-3">

    <!-- Согласие на уведомление -->
    <div class="text-center">
        <div class="text-muted small mb-1">
            <i class="bi bi-bell me-1"></i>Согласие на уведомление
        </div>
        <div class="h3 fw-bold text-dark">{{ notification_agreed }}</div>
    </div>
</div>

<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
</div>
