<!--templates/faq/partials/file_item.html-->
<div class="list-group-item d-flex justify-content-between align-items-center" id="file-item-{{ file.pk }}">
    <div class="d-flex align-items-center">
        <i class="bi bi-file-earmark-text me-3 fs-4 text-primary"></i>
        <div>
            <a href="{% url 'faq:file_download' file.pk %}"
               class="text-decoration-none fw-semibold"
               download>
                {{ file.display_name }}
            </a>
            {% if file.description %}
                <small class="text-muted d-block">{{ file.description }}</small>
            {% endif %}
            <small class="text-muted">{{ file.uploaded_at|date:"d.m.Y H:i" }}</small>
        </div>
    </div>

    {% if is_admin %}
    <button class="btn btn-sm btn-outline-danger"
            hx-delete="{% url 'faq:file_delete' file.pk %}"
            hx-confirm="Удалить файл {{ file.display_name }}?"
            hx-target="#file-item-{{ file.pk }}"
            hx-swap="outerHTML swap:300ms"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            title="Удалить">
        <i class="bi bi-trash"></i>
    </button>
    {% endif %}
</div>
